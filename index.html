<!DOCTYPE html>
<html>
<head>
<title>Witchcraft Magic Tarot 🔮</title>
<style>
  body { margin: 0; overflow: hidden; background: #000; }
  video, canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; }
</style>
</head>
<body>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<!-- เรียกใช้ MediaPipe Hands -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// --- 🌟 เริ่มต้นจุดที่แก้ไข/เพิ่มใหม่ 🌟 ---

// 1. เปลี่ยนรูปไพ่ทาโรต์ให้ขลังและสมจริงขึ้น (ใช้ Unsplash)
const tarotCardImages = [
  "https://images.unsplash.com/photo-1601050690597-df056fb4ce78?w=500&q=80",
  "https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?w=500&q=80",
  "https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=500&q=80"
];
let currentTarotImage = null; // เก็บรูปไพ่ที่สุ่มได้

// 2. ปรับปรุงอนุภาคเวทมนต์ (Magic Sparks) ให้เท่ขึ้น
const particles = [];
class Particle {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.size = Math.random() * 6 + 1.5;
    this.speedX = (Math.random() - 0.5) * 4;
    this.speedY = (Math.random() - 0.5) * 4;
    this.color = `hsl(${Math.random() * 60 + 260}, 100%, 75%)`; // ม่วงเวทมนต์
    this.alpha = 1;
    this.angle = Math.random() * Math.PI * 2;
    this.rotationSpeed = Math.random() * 0.1 - 0.05;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    this.angle += this.rotationSpeed;
    this.alpha -= 0.015;
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    ctx.beginPath();
    ctx.arc(0, 0, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.shadowBlur = 12;
    ctx.shadowColor = this.color;
    ctx.fill();
    ctx.restore();
  }
}

// 3. ปรับปรุงวงเวทย์ (Witch Circle) ให้ซับซ้อนและขลังขึ้น
function drawComplexWitchCircle(x, y, radius) {
  let now = Date.now() / 1000;
  
  ctx.save();
  ctx.lineWidth = 4;
  ctx.strokeStyle = "#9d4edd"; // ม่วงขลัง
  ctx.shadowBlur = 20;
  ctx.shadowColor = "#9d4edd";
  
  // วงนอกพร้อมอักขระ
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.stroke();
  for (let i = 0; i < 16; i++) {
    const angle = i * (Math.PI * 2 / 16) + now;
    const runeX = x + Math.cos(angle) * (radius - 10);
    const runeY = y + Math.sin(angle) * (radius - 10);
    ctx.beginPath();
    ctx.arc(runeX, runeY, 4, 0, Math.PI * 2);
    ctx.fillStyle = "#fff";
    ctx.fill();
  }

  // วงกลางหมุนเร็วขึ้น
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(now * 1.5);
  ctx.beginPath();
  ctx.arc(0, 0, radius - 20, now / 1.5, (now / 1.5) + (Math.PI * 1.5));
  ctx.stroke();
  ctx.restore();

  // วงในสุดแบบทึบพร้อมสัญลักษณ์
  ctx.beginPath();
  ctx.arc(x, y, radius - 40, 0, Math.PI * 2);
  ctx.stroke();
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = "#9d4edd";
  ctx.font = "20px Georgia";
  ctx.fillText("🜋🜔🝘", -30, 8); // สัญลักษณ์เวทมนต์แบบขลัง
  ctx.restore();

  ctx.restore();
}

// 4. เพิ่มเอฟเฟค "ระเบิดเวทย์" เมื่อเปิดไพ่
function explosiveEffect(x, y) {
    for (let i = 0; i < 30; i++) {
        particles.push(new Particle(x, y));
    }
}

// 5. ปรับปรุงฟังก์ชันสุ่มไพ่
let lastPinch = 0;
function randomTarot() {
  let i = Math.floor(Math.random() * tarotCardImages.length);
  currentTarotImage = new Image();
  currentTarotImage.src = tarotCardImages[i];
}

// --- 🌟 สิ้นสุดจุดที่แก้ไข/เพิ่มใหม่ 🌟 ---

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

const hands = new Hands({
  locateFile: (file) => {
    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
  }
});
hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
hands.onResults(results => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // กลับด้านวิดีโอ
  ctx.save();
  ctx.scale(-1, 1);
  ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
  ctx.restore();

  // คำแนะนำสไตล์แม่มด
  ctx.fillStyle = "white";
  ctx.font = "24px 'Apple Chancery', cursive";
  ctx.textAlign = "center";
  ctx.fillText("🔮 ท่าจีบ = ร่ายมนต์เปิดไพ่ 🔮", canvas.width / 2, canvas.height - 50);

  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    const hand = results.multiHandLandmarks[0];
    
    // พิกัดนิ้วโป้งและชี้
    const thumb = hand[4];
    const index = hand[8];
    
    // แปลงพิกัดเป็นพิกัดหน้าจอ
    const tx = (1 - thumb.x) * canvas.width;
    const ty = thumb.y * canvas.height;
    const ix = (1 - index.x) * canvas.width;
    const iy = index.y * canvas.height;

    // ระยะห่างระหว่างนิ้ว
    const distance = Math.sqrt(Math.pow(tx - ix, 2) + Math.pow(ty - iy, 2));

    // จุดศูนย์กลางของวงเวทย์
    const cx = (tx + ix) / 2;
    const cy = (ty + iy) / 2;
    const radius = Math.max(70, distance * 2.2);

    // --- 🌟 เพิ่มเอฟเฟคเวทมนต์และการสุ่มไพ่ 🌟 ---
    
    // 1. เพิ่มประกายเวทมนต์
    if (Math.random() < 0.4) {
      particles.push(new Particle(cx, cy));
    }
    particles.forEach((p, index) => {
      p.update();
      p.draw();
      if (p.alpha <= 0) particles.splice(index, 1);
    });

    // 2. วาดวงเวทย์ขลัง
    drawComplexWitchCircle(cx, cy, radius);

    // 3. ตรวจจับการจีบนิ้ว
    if (distance < 55) {
      let now = Date.now();
      if (now - lastPinch > 1200) { 
        lastPinch = now;
        randomTarot();
        explosiveEffect(cx, cy); // เพิ่มระเบิดเวทย์เมื่อเปิดไพ่
      }
    }

    // 4. วาดรูปไพ่ทาโรต์ขลัง
    if (currentTarotImage && currentTarotImage.complete) {
        ctx.save();
        ctx.translate(canvas.width - 270, 100); 
        
        // ใส่ Border สีม่วงขลัง
        ctx.strokeStyle = "#9d4edd";
        ctx.lineWidth = 6;
        ctx.shadowBlur = 35;
        ctx.shadowColor = "#9d4edd";
        ctx.fillStyle = "rgba(10, 0, 20, 0.9)";
        
        ctx.beginPath();
        ctx.roundRect(0, 0, 190, 315, 15);
        ctx.fill();
        ctx.stroke();
        
        ctx.drawImage(currentTarotImage, 15, 15, 160, 285);
        ctx.restore();
    }
    
    // --- 🌟 สิ้นสุดจุดที่แก้ไข/เพิ่มใหม่ 🌟 ---

  }
});

navigator.mediaDevices.getUserMedia({ video: true, audio: false }).then(stream => {
  video.srcObject = stream;
  video.addEventListener('loadeddata', () => {
    function predictionLoop() {
      hands.send({ image: video });
      requestAnimationFrame(predictionLoop);
    }
    predictionLoop();
  });
});
</script>
</body>
</html>
