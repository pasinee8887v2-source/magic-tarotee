<!DOCTYPE html>
<html>
<head>
<title>Magic Tarot 🔮</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

video, canvas {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

#card {
  position: absolute;
  width: 220px;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  display: none;
  border-radius: 10px;
  box-shadow: 0 0 30px cyan;
  z-index: 10; /* ให้ไพ่อยู่ด้านบนสุด */
}
</style>

</head>

<body>

<video id="video" autoplay playsinline style="display: none;"></video>
<canvas id="canvas"></canvas>
<img id="card">

<!-- ใช้เฉพาะ hands.js ไม่ต้องใช้ camera_utils.js -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const card = document.getElementById("card");

const tarotCards = [
  "https://upload.wikimedia.org/wikipedia/commons/5/53/RWS_Tarot_00_Fool.jpg",
  "https://upload.wikimedia.org/wikipedia/commons/c/c3/RWS_Tarot_01_Magician.jpg",
  "https://upload.wikimedia.org/wikipedia/commons/2/2b/RWS_Tarot_02_High_Priestess.jpg"
];

let lastTrigger = 0;

// ตั้งค่าขนาด Canvas ให้เต็มจอ
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// วงเวทย์
function drawMagic(x, y) {
  ctx.beginPath();
  ctx.arc(x, y, 50, 0, Math.PI * 2);
  ctx.strokeStyle = "cyan";
  ctx.lineWidth = 4;
  ctx.shadowBlur = 25;
  ctx.shadowColor = "cyan";
  ctx.stroke();
  // รีเซ็ต shadow เพื่อไม่ให้กระทบกับการวาดส่วนอื่น
  ctx.shadowBlur = 0; 
}

// สุ่มไพ่
function randomCard() {
  let i = Math.floor(Math.random() * tarotCards.length);
  card.src = tarotCards[i];
  card.style.display = "block";
}

// โหลด MediaPipe Hands
const hands = new Hands({
  locateFile: (file) => {
    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
  }
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

hands.onResults(results => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // กลับภาพเหมือนกระจก
  ctx.save();
  ctx.scale(-1, 1);
  ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
  ctx.restore();

  // ตรวจจับมือ
  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    const hand = results.multiHandLandmarks[0];
    const index = hand[8];  // นิ้วชี้
    const thumb = hand[4];  // นิ้วโป้ง

    // คำนวณพิกัด (กลับฝั่ง x เพื่อให้ตรงกับภาพกระจก)
    const x = (1 - index.x) * canvas.width;
    const y = index.y * canvas.height;

    drawMagic(x, y);

    // ระยะห่างโป้งกับชี้
    const dx = thumb.x - index.x;
    const dy = thumb.y - index.y;
    const distance = Math.sqrt(dx * dx + dy * dy);

    // จีบนิ้ว = เปิดไพ่ (ปรับค่าระยะความกว้างให้ใช้ง่ายขึ้นเล็กน้อย)
    if (distance < 0.08) {
      let now = Date.now();
      if (now - lastTrigger > 1500) {
        randomCard();
        lastTrigger = now;
      }
    }
  }
});

// เปิดกล้องด้วย JavaScript มาตรฐาน (ไม่พึ่ง Camera Utils)
navigator.mediaDevices.getUserMedia({
  video: { width: 1280, height: 720 }
})
.then(stream => {
  video.srcObject = stream;
  video.addEventListener('loadeddata', async () => {
    // ลูปส่งเฟรมวิดีโอไปให้ MediaPipe ประมวลผล
    async function predictionLoop() {
      await hands.send({ image: video });
      requestAnimationFrame(predictionLoop);
    }
    predictionLoop();
  });
})
.catch(err => {
  console.error("ไม่สามารถเข้าถึงกล้องได้: ", err);
  alert("กรุณาอนุญาตให้เข้าถึงกล้องถ่ายภาพ");
});
</script>

</body>
</html>
