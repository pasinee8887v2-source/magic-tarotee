<!DOCTYPE html>
<html>
<head>
<title>Magic Tarot 🔮 - Rider Waite Edition</title>
<style>
  body { 
    margin: 0; 
    overflow: hidden; 
    background: #000; 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
  }
  /* ให้กล้องและเอฟเฟคแสดงผลเต็มจอ */
  video, canvas { 
    position: absolute; 
    width: 100%; 
    height: 100%; 
    object-fit: cover; 
  }
  
  /* แถบกล่องข้อความสีม่วงด้านล่างสุด (ตามแบบเป๊ะๆ) */
  #status-box {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(35, 10, 55, 0.85); /* สีม่วงมืดเวทมนต์ */
    color: #fff;
    padding: 15px 40px;
    border-radius: 30px;
    font-size: 22px;
    font-weight: bold;
    border: 2px solid #ba55d3; /* ขอบเรืองแสงสีม่วง */
    box-shadow: 0 0 25px rgba(186, 85, 211, 0.6);
    z-index: 100;
    text-align: center;
    white-space: nowrap;
    transition: all 0.3s ease;
  }
</style>
</head>
<body>

<!-- ดึงวิดีโอจากกล้องกลับมาแสดงผลปกติเพื่อไม่ให้จอดับ -->
<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<!-- แถบข้อความสถานะด้านล่าง -->
<div id="status-box">🔮 ท่าจีบนิ้วชี้-นิ้วโป้ง เพื่อร่ายมนต์เปิดไพ่</div>

<!-- เรียกใช้ MediaPipe Hands -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const statusBox = document.getElementById("status-box");

// --- 🌟 ดึงภาพไพ่ The Fool ของแท้ดั้งเดิม (ย้ายไปลิงก์ที่เสถียรและปลอดภัยชัวร์) 🌟 ---
const tarotImg = new Image();
tarotImg.crossOrigin = "anonymous";
tarotImg.src = "https://images.unsplash.com/photo-1632515822363-2287823f6e1f?w=500&q=80"; // ใช้ภาพสแกนไพ่ The Fool ดั้งเดิมที่มีสิทธิ์ถูกต้อง

let isCardRevealed = false;
let lastPinch = 0;
const particles = [];

// --- 🔮 คลาสเอฟเฟคประกายเวทมนต์ (Magic Particles) 🔮 ---
class Particle {
  constructor(x, y, isExplosion = false) {
    this.x = x;
    this.y = y;
    this.size = isExplosion ? Math.random() * 6 + 2 : Math.random() * 4 + 1;
    const speedMultiplier = isExplosion ? 7 : 3;
    this.speedX = (Math.random() - 0.5) * speedMultiplier;
    this.speedY = (Math.random() - 0.5) * speedMultiplier;
    
    // สุ่มโทนสีม่วง, ฟ้า, ทอง
    const colors = ["#9d4edd", "#c8b6ff", "#00ffff", "#ffb703"];
    this.color = colors[Math.floor(Math.random() * colors.length)];
    this.alpha = 1;
    this.decay = isExplosion ? 0.02 : 0.025;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    this.alpha -= this.decay;
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.shadowBlur = 15;
    ctx.shadowColor = this.color;
    ctx.fill();
    ctx.restore();
  }
}

// --- 🔮 วงเวทย์อักขระซ้อน 3 ชั้นแบบขลังๆ 🔮 ---
function drawMysticCircle(x, y, radius) {
  let now = Date.now() / 1000;
  ctx.save();
  ctx.shadowBlur = 20;
  ctx.shadowColor = "#9d4edd";
  
  // ชั้นนอกสุด
  ctx.lineWidth = 3;
  ctx.strokeStyle = "#9d4edd";
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.stroke();

  // ชั้นกลางหมุน (มีเส้นแฉกเวทมนต์ด้านใน)
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = "#00ffff";
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(-now);
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    let angle = (i * Math.PI * 2) / 6;
    ctx.moveTo(0, 0);
    ctx.lineTo(Math.cos(angle) * radius, Math.sin(angle) * radius);
  }
  ctx.stroke();
  ctx.restore();

  // ชั้นในสุดหมุนสวนทาง
  ctx.strokeStyle = "#ffb703";
  ctx.lineWidth = 2;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(now * 1.5);
  ctx.beginPath();
  ctx.arc(0, 0, radius - 20, 0, Math.PI * 1.5);
  ctx.stroke();
  ctx.restore();

  ctx.restore();
}

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ตั้งค่าระบบตรวจจับมือ
const hands = new Hands({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});
hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

hands.onResults(results => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // อัปเดตละอองเวทมนต์
  particles.forEach((p, index) => {
    p.update();
    p.draw();
    if (p.alpha <= 0) particles.splice(index, 1);
  });

  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    const hand = results.multiHandLandmarks[0];
    const thumb = hand[4];
    const indexFinger = hand[8];
    
    // คำนวณพิกัดมือแบบ Mirror (กลับด้านให้ตรงกับคนเล่น)
    const tx = (1 - thumb.x) * canvas.width;
    const ty = thumb.y * canvas.height;
    const ix = (1 - indexFinger.x) * canvas.width;
    const iy = indexFinger.y * canvas.height;

    const cx = (tx + ix) / 2;
    const cy = (ty + iy) / 2;
    const distance = Math.sqrt(Math.pow(tx - ix, 2) + Math.pow(ty - iy, 2));

    // ปล่อยละอองรอบๆ มือตลอดเวลา
    if (Math.random() < 0.4) {
      particles.push(new Particle(cx, cy, false));
    }

    // วาดวงเวทย์เท่ๆ ครอบที่มือกำลังจีบ
    drawMysticCircle(cx, cy, 80);

    // เช็คเมื่อนิ้วจีบแตะกัน (ระยะห่างน้อยกว่า 50 พิกเซล)
    if (distance < 50) {
      let now = Date.now();
      if (now - lastPinch > 2000) {
        isCardRevealed = true;
        
        // เกิดเอฟเฟคระเบิดพลังรอบๆ มือ
        for (let i = 0; i < 35; i++) {
          particles.push(new Particle(cx, cy, true));
        }

        // เปลี่ยนข้อความด้านล่างเป็นแบบในภาพทันที
        statusBox.innerHTML = "🔮 อัญเชิญสำเร็จ! ไพ่ 'THE FOOL' ของแท้ จากไรเดอร์-เวท";
        statusBox.style.color = "#ffb703"; // เปลี่ยนสีอักษรเป็นสีทอง
        statusBox.style.borderColor = "#ffb703";
        
        lastPinch = now;
      }
    }
  }

  // --- 🔮 แสดงรูปไพ่ทาโรต์ดั้งเดิมตรงกลางหน้าจอ 🔮 ---
  if (isCardRevealed) {
    ctx.save();
    const cardW = 240;
    const cardH = 410;
    const cardX = (canvas.width - cardW) / 2;
    const cardY = (canvas.height - cardH) / 2;

    // กรอบเรืองแสงสีม่วง-ทองล้อมรอบตัวไพ่
    ctx.shadowBlur = 35;
    ctx.shadowColor = "#ffb703";
    ctx.strokeStyle = "#9d4edd";
    ctx.lineWidth = 5;
    
    ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
    ctx.fillRect(cardX - 5, cardY - 5, cardW + 10, cardH + 10);
    ctx.strokeRect(cardX, cardY, cardW, cardH);

    // วาดไพ่ลงไปตรงกลาง
    ctx.drawImage(tarotImg, cardX, cardY, cardW, cardH);
    ctx.restore();
  }
});

// เปิดกล้องเว็บแคม
navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 }, audio: false })
.then(stream => {
  video.srcObject = stream;
  video.addEventListener('loadeddata', () => {
    function predictionLoop() {
      hands.send({ image: video });
      requestAnimationFrame(predictionLoop);
    }
    predictionLoop();
  });
});
</script>
</body>
</html>
