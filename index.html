<!DOCTYPE html>
<html>
<head>
<title>Magic Tarot 🔮 - Witch Edition</title>
<style>
  body { margin: 0; overflow: hidden; background: #000; }
  video, canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; }
</style>
</head>
<body>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<!-- เรียกใช้ MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// --- 🌟 โหลดรูปภาพเตรียมไว้ล่วงหน้า (ป้องกันปัญหารูปไม่ขึ้น) 🌟 ---
const tarotImg = new Image();
tarotImg.crossOrigin = "anonymous"; 
tarotImg.src = "https://www.shitsuren-tarot.com/wp/wp-content/uploads/2017/06/M_0.png";

let isCardRevealed = false; // สถานะเปิดไพ่
let lastPinch = 0;

// --- 🔮 เอฟフェคเวทมนต์ (Particles) 🔮 ---
const particles = [];
class Particle {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.size = Math.random() * 5 + 2;
    this.speedX = (Math.random() - 0.5) * 4;
    this.speedY = (Math.random() - 0.5) * 4;
    this.color = `hsl(${Math.random() * 60 + 260}, 100%, 75%)`; // โทนสีม่วง/ชมพูเวทมนต์
    this.alpha = 1;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    this.alpha -= 0.02;
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.shadowBlur = 10;
    ctx.shadowColor = this.color;
    ctx.fill();
    ctx.restore();
  }
}

// --- 🔮 วงเวทย์แม่มดหมุนวน 🔮 ---
function drawWitchCircle(x, y, radius) {
  let now = Date.now() / 1000;
  
  ctx.save();
  ctx.lineWidth = 3;
  ctx.strokeStyle = "#ba55d3"; 
  ctx.shadowBlur = 15;
  ctx.shadowColor = "#ba55d3";
  
  // วงนอก
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.stroke();

  // วงในหมุน
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(now);
  ctx.beginPath();
  ctx.arc(0, 0, radius - 15, 0, Math.PI * 1.5);
  ctx.stroke();
  ctx.restore();

  ctx.restore();
}

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ตั้งค่า MediaPipe Hands
const hands = new Hands({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});
hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

hands.onResults(results => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // วาดภาพจากกล้องเว็บแคม (Mirror)
  ctx.save();
  ctx.scale(-1, 1);
  ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
  ctx.restore();

  // วาดและอัปเดตเอฟเฟคละอองเวทมนต์
  particles.forEach((p, index) => {
    p.update();
    p.draw();
    if (p.alpha <= 0) particles.splice(index, 1);
  });

  // เขียนคำแนะนำบนหน้าจอ
  ctx.fillStyle = "#fff";
  ctx.font = "bold 20px Arial";
  ctx.shadowBlur = 8;
  ctx.shadowColor = "#ba55d3";
  ctx.fillText("🔮 ท่าจีบนิ้วชี้-นิ้วโป้ง เพื่อร่ายมนต์เปิดไพ่", 30, 50);

  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    const hand = results.multiHandLandmarks[0];
    
    // พิกัดนิ้วโป้ง (4) และ นิ้วชี้ (8)
    const thumb = hand[4];
    const indexFinger = hand[8];
    
    const tx = (1 - thumb.x) * canvas.width;
    const ty = thumb.y * canvas.height;
    const ix = (1 - indexFinger.x) * canvas.width;
    const iy = indexFinger.y * canvas.height;

    // หาจุดกึ่งกลางระหว่างสองนิ้วเพื่อวาดเอฟเฟค
    const cx = (tx + ix) / 2;
    const cy = (ty + iy) / 2;

    // คำนวณระยะห่างเพื่อเช็คการ "จีบมือ"
    const distance = Math.sqrt(Math.pow(tx - ix, 2) + Math.pow(ty - iy, 2));

    // ปล่อยละอองเวทย์ออกจากนิ้วมือตลอดเวลาที่ยกมือ
    if (Math.random() < 0.4) {
      particles.push(new Particle(cx, cy));
    }

    // วาดวงเวทย์แม่มดตามตำแหน่งมือ
    drawWitchCircle(cx, cy, 60);

    // หากระยะห่างนิ้วเหลือน้อยกว่า 40 พิกเซล (คือการจีบนิ้วแตะกัน)
    if (distance < 40) {
      let now = Date.now();
      if (now - lastPinch > 1500) { // หน่วงเวลา 1.5 วินาที
        isCardRevealed = true; // เปิดการแสดงไพ่
        // ระเบิดเอฟเฟคกระจาย
        for(let i=0; i<15; i++) {
          particles.push(new Particle(cx, cy));
        }
        lastPinch = now;
      }
    }
  }

  // --- วาดรูปไพ่ทาโรต์กลางหน้าจอเมื่อสั่งเปิดไพ่สำเร็จ ---
  if (isCardRevealed && tarotImg.complete) {
    ctx.save();
    
    // กำหนดขนาดและตำแหน่งไพ่ตรงกลางจอ
    const cardW = 200;
    const cardH = 320;
    const cardX = (canvas.width - cardW) / 2;
    const cardY = (canvas.height - cardH) / 2;

    // วาดกรอบเรืองแสงสีม่วงเวทมนต์รอบไพ่
    ctx.shadowBlur = 30;
    ctx.shadowColor = "#ba55d3";
    ctx.strokeStyle = "#ba55d3";
    ctx.lineWidth = 4;
    ctx.strokeRect(cardX, cardY, cardW, cardH);

    // วาดรูปไพ่
    ctx.drawImage(tarotImg, cardX, cardY, cardW, cardH);
    ctx.restore();
  }
});

// เปิดกล้อง
navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 }, audio: false })
.then(stream => {
  video.srcObject = stream;
  video.addEventListener('loadeddata', () => {
    function predictionLoop() {
      hands.send({ image: video });
      requestAnimationFrame(predictionLoop);
    }
    predictionLoop();
  });
})
.catch(err => {
  alert("กรุณาเปิดสิทธิ์ให้เว็บเข้าถึงกล้องถ่ายภาพด้วยนะครับ");
});
</script>
</body>
</html>
