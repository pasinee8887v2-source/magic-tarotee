<!DOCTYPE html>
<html>
<head>
<title>Witchcraft Rider-Waite Tarot 🔮</title>
<style>
  body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  video, canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; }
</style>
</head>
<body>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<!-- เรียกใช้ MediaPipe Hands -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// --- 🌟 อัปเดตลิงก์รูปไพ่ Rider-Waite ของแท้ 🌟 ---
const tarotCards = [
  { name: "THE FOOL", url: "https://upload.wikimedia.org/wikipedia/commons/0/0a/RWS_Tarot_00_Fool.jpg" },
  { name: "THE MAGICIAN", url: "https://upload.wikimedia.org/wikipedia/commons/d/de/RWS_Tarot_01_Magician.jpg" },
  { name: "DEATH", url: "https://upload.wikimedia.org/wikipedia/commons/d/d7/RWS_Tarot_13_Death.jpg" }
];

// โหลดรูปภาพทั้งหมดมารอไว้ล่วงหน้าเพื่อความลื่นไหล
const loadedImages = [];
tarotCards.forEach(card => {
  const img = new Image();
  img.crossOrigin = "anonymous";
  img.src = card.url;
  loadedImages.push({ name: card.name, img: img });
});

let currentCard = null;
let lastPinch = 0;
const particles = [];

// --- 🔮 คลาสเอฟเฟคละอองเวทมนต์ (Magic Particles) แบบจัดเต็ม 🔮 ---
class Particle {
  constructor(x, y, isExplosion = false) {
    this.x = x;
    this.y = y;
    this.size = isExplosion ? Math.random() * 6 + 2 : Math.random() * 4 + 1;
    // ถ้าระเบิดให้กระจายแรงขึ้น
    const speedMultiplier = isExplosion ? 8 : 3;
    this.speedX = (Math.random() - 0.5) * speedMultiplier;
    this.speedY = (Math.random() - 0.5) * speedMultiplier;
    
    // สุ่มสีโทนแม่มดขลังๆ (ม่วงเข้ม, ม่วงสว่าง, ฟ้าคราม, ทองเวทมนต์)
    const colors = ["#9d4edd", "#c8b6ff", "#00ffff", "#ffb703", "#e0aaff"];
    this.color = colors[Math.floor(Math.random() * colors.length)];
    this.alpha = 1;
    this.decay = isExplosion ? 0.015 : 0.02;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    this.alpha -= this.decay;
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.shadowBlur = 15;
    ctx.shadowColor = this.color;
    ctx.fill();
    ctx.restore();
  }
}

// --- 🔮 วาดวงเวทย์อักขระโบราณแบบซับซ้อน 🔮 ---
function drawMysticCircle(x, y, radius) {
  let now = Date.now() / 1000;
  
  ctx.save();
  ctx.shadowBlur = 25;
  ctx.shadowColor = "#9d4edd";
  
  // 1. วงนอกสุด (เส้นหนา)
  ctx.lineWidth = 4;
  ctx.strokeStyle = "#9d4edd";
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.stroke();

  // 2. วงกลางหมุนทวนเข็มนาฬิกา + มีจุดอักขระ
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = "#00ffff";
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(-now * 0.8);
  ctx.beginPath();
  ctx.arc(0, 0, radius - 15, 0, Math.PI * 2);
  ctx.stroke();
  
  // วาดแฉกดาวภายในวงเวทย์เพิ่มความขลัง
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    let angle = (i * Math.PI * 2) / 5;
    ctx.lineTo(Math.cos(angle) * (radius - 15), Math.sin(angle) * (radius - 15));
  }
  ctx.closePath();
  ctx.stroke();
  ctx.restore();

  // 3. วงในสุด หมุนตามเข็มนาฬิกา
  ctx.strokeStyle = "#ffb703";
  ctx.lineWidth = 2;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(now * 1.2);
  ctx.beginPath();
  ctx.arc(0, 0, radius - 35, 0, Math.PI * 1.5);
  ctx.stroke();
  ctx.restore();

  ctx.restore();
}

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ตั้งค่าระบบตรวจจับมือ
const hands = new Hands({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});
hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

hands.onResults(results => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // วาดกล้อง (Mirror)
  ctx.save();
  ctx.scale(-1, 1);
  ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
  ctx.restore();

  // อัปเดตเอฟเฟคละอองเวทมนต์ที่ค้างอยู่ทั้งหมด
  particles.forEach((p, index) => {
    p.update();
    p.draw();
    if (p.alpha <= 0) particles.splice(index, 1);
  });

  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    const hand = results.multiHandLandmarks[0];
    const thumb = hand[4];
    const indexFinger = hand[8];
    
    const tx = (1 - thumb.x) * canvas.width;
    const ty = thumb.y * canvas.height;
    const ix = (1 - indexFinger.x) * canvas.width;
    const iy = indexFinger.y * canvas.height;

    const cx = (tx + ix) / 2;
    const cy = (ty + iy) / 2;
    const distance = Math.sqrt(Math.pow(tx - ix, 2) + Math.pow(ty - iy, 2));

    // ปล่อยละอองเวทย์ปกติรอบๆ นิ้ว
    if (Math.random() < 0.5) {
      particles.push(new Particle(cx, cy, false));
    }

    // วาดวงเวทย์แม่มดอลังการตามตำแหน่งมือ
    drawMysticCircle(cx, cy, 75);

    // ท่าจีบนิ้วเพื่อทำพิธีสุ่มเปิดไพ่ (ระยะห่างน้อยกว่า 45 พิกเซล)
    if (distance < 45) {
      let now = Date.now();
      if (now - lastPinch > 2000) { // หน่วงเวลาสุ่มใหม่ทุก 2 วินาที
        // สุ่มไพ่จาก 3 ใบที่กำหนดไว้
        const randomIndex = Math.floor(Math.random() * loadedImages.length);
        currentCard = loadedImages[randomIndex];

        // เกิดเอฟเฟคระเบิดเวทมนต์กระจายรอบจอขลังๆ 40 ชิ้น
        for (let i = 0; i < 40; i++) {
          particles.push(new Particle(cx, cy, true));
        }
        lastPinch = now;
      }
    }
  }

  // --- 🔮 ส่วนของการแสดงผลไพ่ทาโรต์กลางหน้าจอ 🔮 ---
  if (currentCard && currentCard.img.complete) {
    ctx.save();
    
    // กำหนดขนาดสัดส่วนไพ่สากลและจัดให้อยู่ตรงกลางจอพอดี
    const cardW = 240;
    const cardH = 410;
    const cardX = (canvas.width - cardW) / 2;
    const cardY = (canvas.height - cardH) / 2;

    // สร้างกรอบเงาเรืองแสงสีทองและม่วงล้อมรอบตัวไพ่ให้ดูศักดิ์สิทธิ์
    ctx.shadowBlur = 40;
    ctx.shadowColor = "#ffb703";
    ctx.strokeStyle = "#9d4edd";
    ctx.lineWidth = 5;
    
    // วาดพื้นหลังสีดำใสให้ไพ่ดูตัดกับฉากหลัง
    ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
    ctx.fillRect(cardX - 5, cardY - 5, cardW + 10, cardH + 10);
    ctx.strokeRect(cardX, cardY, cardW, cardH);

    // วาดรูปไพ่ Rider-Waite แท้ลงไป
    ctx.drawImage(currentCard.img, cardX, cardY, cardW, cardH);

    // เขียนชื่อไพ่กำกับไว้ใต้ภาพด้วยฟอนต์หรูๆ
    ctx.fillStyle = "#fff";
    ctx.font = "bold 22px Georgia";
    ctx.shadowColor = "#000";
    ctx.shadowBlur = 4;
    ctx.textAlign = "center";
    ctx.fillText(currentCard.name, canvas.width / 2, cardY + cardH + 35);

    ctx.restore();
  } else {
    // ข้อความแนะนำผู้เล่นตอนเริ่มเกม
    ctx.save();
    ctx.fillStyle = "#fff";
    ctx.font = "bold 22px 'Segoe UI'";
    ctx.shadowBlur = 10;
    ctx.shadowColor = "#9d4edd";
    ctx.textAlign = "center";
    ctx.fillText("🔮 ยกมือทำท่าจับจีบ (นิ้วชี้แตะนิ้วโป้ง) เพื่ออัญเชิญไพ่ทาโรต์ 🔮", canvas.width / 2, canvas.height - 60);
    ctx.restore();
  }
});

// เปิดการใช้งานกล้องเว็บแคม
navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 }, audio: false })
.then(stream => {
  video.srcObject = stream;
  video.addEventListener('loadeddata', () => {
    function predictionLoop() {
      hands.send({ image: video });
      requestAnimationFrame(predictionLoop);
    }
    predictionLoop();
  });
});
</script>
</body>
</html>
