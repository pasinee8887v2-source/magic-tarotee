<!DOCTYPE html>
<html>
<head>
<title>Witchcraft Magic Tarot 🔮</title>
<style>
  body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  video, canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; }
  
  /* สไตล์แถบข้อความด้านล่างตอนไพ่ขึ้น (ตามภาพ image_4.png) */
  #success-message {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(45, 0, 90, 0.9); /* แถบสีม่วงทึบ */
    color: #ffb703; /* ตัวอักษรสีทองเวทมนต์ */
    padding: 15px 40px;
    border-radius: 25px;
    font-size: 22px;
    font-weight: bold;
    border: 2px solid #ba55d3; /* ขอบเรืองแสง */
    box-shadow: 0 0 20px rgba(186, 85, 211, 0.7);
    z-index: 100;
    text-align: center;
    white-space: nowrap;
    opacity: 0; /* ซ่อนไว้ก่อนตอนเริ่ม */
    transition: opacity 0.5s ease-in-out; /* ค่อยๆ ปรากฏ */
  }
  
  /* ข้อความแนะนำตอนเริ่มเกม (สีขาวปกติ) */
  #hint-text {
    position: absolute;
    bottom: 80px; /* ขยับขึ้นไปไม่ให้ทับกับแถบม่วง */
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: 20px;
    font-weight: bold;
    text-shadow: 0 0 10px #ba55d3;
    z-index: 99;
    text-align: center;
    opacity: 1; /* โชว์ตอนเริ่ม */
    transition: opacity 0.3s ease-in-out;
  }
</style>
</head>
<body>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<!-- แถบข้อความตามภาพ image_4.png -->
<div id="success-message">🔮 อัญเชิญสำเร็จ! ไพ่ 'THE FOOL' ของแท้ จากไรเดอร์-เวท</div>
<!-- ข้อความแนะนำตอนเริ่ม -->
<div id="hint-text">🔮 ท่าจีบนิ้วชี้-นิ้วโป้ง เพื่อร่ายมนต์เปิดไพ่</div>

<!-- เรียกใช้ MediaPipe Hands -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const successMsg = document.getElementById("success-message");
const hintText = document.getElementById("hint-text");

// --- 🌟 อัปเดตลิงก์รูปไพ่ 'THE FOOL' ของแท้จาก Rider-Waite 🌟 ---
const tarotImg = new Image();
tarotImg.crossOrigin = "anonymous"; 
tarotImg.src = "https://upload.wikimedia.org/wikipedia/commons/0/0a/RWS_Tarot_00_Fool.jpg"; // ลิงก์ตรงรูป Fool ของแท้

let isCardRevealed = false; // สถานะเปิดไพ่
let lastPinch = 0;

// --- 🔮 เอฟเฟคละอองเวทมนต์ (Particles) แบบจัดเต็ม 🔮 ---
const particles = [];
class Particle {
  constructor(x, y, isExplosion = false) {
    this.x = x;
    this.y = y;
    this.size = isExplosion ? Math.random() * 6 + 2 : Math.random() * 4 + 1;
    // ถ้าระเบิดให้กระจายแรงขึ้น
    const speedMultiplier = isExplosion ? 8 : 3;
    this.speedX = (Math.random() - 0.5) * speedMultiplier;
    this.speedY = (Math.random() - 0.5) * speedMultiplier;
    
    // สุ่มสีโทนแม่มดขลังๆ (ม่วงเข้ม, ม่วงสว่าง, ฟ้าคราม, ทองเวทมนต์)
    const colors = ["#9d4edd", "#c8b6ff", "#00ffff", "#ffb703", "#e0aaff"];
    this.color = colors[Math.floor(Math.random() * colors.length)];
    this.alpha = 1;
    this.decay = isExplosion ? 0.015 : 0.02;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    this.alpha -= this.decay;
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.shadowBlur = 15;
    ctx.shadowColor = this.color;
    ctx.fill();
    ctx.restore();
  }
}

// --- 🔮 วาดวงเวทย์อักขระโบราณซับซ้อนตามตำแหน่งมือ 🔮 ---
function drawMysticCircle(x, y, radius) {
  let now = Date.now() / 1000;
  
  ctx.save();
  ctx.shadowBlur = 25;
  ctx.shadowColor = "#ba55d3"; 
  
  // 1. วงนอกสุด (เส้นหนา สีม่วง)
  ctx.lineWidth = 4;
  ctx.strokeStyle = "#ba55d3";
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.stroke();

  // 2. วงกลางหมุนเร็วขึ้น (สีฟ้าคราม)
  ctx.lineWidth = 2;
  ctx.strokeStyle = "#00ffff";
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(now * 1.5);
  ctx.beginPath();
  ctx.arc(0, 0, radius - 15, 0, Math.PI * 1.5);
  ctx.stroke();
  ctx.restore();

  // 3. วงในสุดพร้อมจุดอักขระ
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(-now);
  ctx.lineWidth = 1;
  ctx.strokeStyle = "#fff";
  for (let i = 0; i < 8; i++) {
    const angle = i * (Math.PI * 2 / 8);
    const px = Math.cos(angle) * (radius - 5);
    const py = Math.sin(angle) * (radius - 5);
    ctx.beginPath();
    ctx.arc(px, py, 3, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.restore();

  ctx.restore();
}

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ตั้งค่า MediaPipe Hands
const hands = new Hands({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});
hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

hands.onResults(results => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // วาดภาพจากกล้องเว็บแคม (Mirror)
  ctx.save();
  ctx.scale(-1, 1);
  ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
  ctx.restore();

  // วาดและอัปเดตเอฟเฟคละอองเวทมนต์ที่ค้างอยู่
  particles.forEach((p, index) => {
    p.update();
    p.draw();
    if (p.alpha <= 0) particles.splice(index, 1);
  });

  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    const hand = results.multiHandLandmarks[0];
    
    // พิกัดนิ้วโป้ง (4) และ นิ้วชี้ (8)
    const thumb = hand[4];
    const indexFinger = hand[8];
    
    const tx = (1 - thumb.x) * canvas.width;
    const ty = thumb.y * canvas.height;
    const ix = (1 - indexFinger.x) * canvas.width;
    const iy = indexFinger.y * canvas.height;

    // หาจุดกึ่งกลางระหว่างสองนิ้วเพื่อวาดเอฟเฟค
    const cx = (tx + ix) / 2;
    const cy = (ty + iy) / 2;

    // คำนวณระยะห่างเพื่อเช็คการ "จีบมือ"
    const distance = Math.sqrt(Math.pow(tx - ix, 2) + Math.pow(ty - iy, 2));

    // ปล่อยละอองเวทย์ออกมาจากนิ้วปกติรอบๆ ยกมือ
    if (Math.random() < 0.5) {
      particles.push(new Particle(cx, cy, false));
    }

    // วาดวงเวทย์แม่มดอลังการตามตำแหน่งมือ
    drawMysticCircle(cx, cy, 75);

    // หากระยะห่างนิ้วเหลือน้อยกว่า 40 พิกเซล (คือการจีบนิ้วแตะกัน)
    if (distance < 40) {
      let now = Date.now();
      if (now - lastPinch > 1500) { // หน่วงเวลา 1.5 วินาที
        isCardRevealed = true; // เปิดการแสดงไพ่
        
        // ระเบิดอนุภาคเวทมนต์กระจายรอบๆ 30 ชิ้น (เป็นเอฟเฟคระเบิดตามภาพ 4)
        for (let i = 0; i < 30; i++) {
          particles.push(new Particle(cx, cy, true));
        }

        // จัดการข้อความตามภาพ image_4.png
        hintText.style.opacity = "0"; // ซ่อนคำแนะนำตอนเริ่ม
        successMsg.style.opacity = "1"; // แสดงแถบสีม่วงอัญเชิญสำเร็จ
        
        lastPinch = now;
      }
    }
  }

  // --- วาดรูปไพ่ 'THE FOOL' ของแท้ กลางหน้าจอเมื่อสั่งเปิดไพ่สำเร็จ ---
  if (isCardRevealed && tarotImg.complete) {
    ctx.save();
    
    // กำหนดขนาดสัดส่วนไพ่สากลและจัดให้อยู่ตรงกลางจอพอดี
    const cardW = 240;
    const cardH = 410;
    const cardX = (canvas.width - cardW) / 2;
    const cardY = (canvas.height - cardH) / 2;

    // สร้างกรอบเงาเรืองแสงสีทองและม่วงล้อมรอบตัวไพ่ให้ดูศักดิ์สิทธิ์
    ctx.shadowBlur = 40;
    ctx.shadowColor = "#ffb703";
    ctx.strokeStyle = "#ba55d3";
    ctx.lineWidth = 5;
    
    // วาดพื้นหลังสีดำใสให้ไพ่ดูตัดกับฉากหลัง
    ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
    ctx.fillRect(cardX - 5, cardY - 5, cardW + 10, cardH + 10);
    ctx.strokeRect(cardX, cardY, cardW, cardH);

    // วาดรูปไพ่ Rider-Waite แท้ลงไป
    ctx.drawImage(tarotImg, cardX, cardY, cardW, cardH);
    ctx.restore();
  }
});

// เปิดกล้อง
navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 }, audio: false })
.then(stream => {
  video.srcObject = stream;
  video.addEventListener('loadeddata', () => {
    function predictionLoop() {
      hands.send({ image: video });
      requestAnimationFrame(predictionLoop);
    }
    predictionLoop();
  });
})
.catch(err => {
  alert("กรุณาเปิดสิทธิ์ให้เว็บเข้าถึงกล้องถ่ายภาพด้วยนะครับ");
});
</script>
</body>
</html>
