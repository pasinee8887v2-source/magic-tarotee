<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magic Tarot 🔮 - 100% DOM Edition</title>
<style>
  body, html { margin: 0; padding: 0; overflow: hidden; background: #000; width: 100%; height: 100%; font-family: sans-serif; }
  
  /* ตัวกล้องเว็บแคม */
  video { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); z-index: 1; }
  
  /* วงเวทย์ (ใช้วิธีแสดงผลผ่าน CSS Animation หมุนจริงชัวร์) */
  #magic-circle {
    position: absolute; width: 160px; height: 160px;
    border: 4px double #9d4edd; border-radius: 50%;
    box-shadow: 0 0 25px #9d4edd, inset 0 0 25px #00ffff;
    z-index: 5; pointer-events: none; display: none;
    transform: translate(-50%, -50%);
    animation: rotateCircle 4s linear infinite;
  }
  #magic-circle::before {
    content: "🔮✨🌟✨🔮"; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%); color: #00ffff; font-size: 14px; letter-spacing: 5px;
  }
  @keyframes rotateCircle { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

  /* ตัวไพ่ทาโรต์ The Fool (ใช้การจัดหน้าแบบลอยกึ่งกลางจอ) */
  #tarot-card {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
    width: 250px; height: 410px; border-radius: 15px; border: 4px solid #ffb703;
    background: linear-gradient(135deg, #fff3b0, #e0aaff, #3c096c);
    box-shadow: 0 0 40px rgba(255, 183, 3, 0.8); z-index: 10;
    transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 20px 0; box-sizing: border-box;
  }
  #tarot-card.show { transform: translate(-50%, -50%) scale(1); }
  .card-num { color: #3c096c; font-size: 40px; font-weight: bold; font-family: Georgia, serif; }
  .card-art { font-size: 80px; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
  .card-title { background: rgba(15, 0, 30, 0.85); color: #fff; padding: 8px 30px; border-radius: 5px; border: 1.5px solid #ffb703; font-weight: bold; font-family: Georgia, serif; font-size: 18px; }

  /* แถบกล่องข้อความสีม่วงด้านล่างสุด */
  #status-box {
    position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
    background: rgba(35, 10, 55, 0.95); color: #fff; padding: 15px 40px;
    border-radius: 30px; font-size: 22px; font-weight: bold; border: 2px solid #ba55d3;
    box-shadow: 0 0 25px rgba(186, 85, 211, 0.6); z-index: 20; text-align: center; white-space: nowrap;
    transition: all 0.3s ease; pointer-events: none;
  }
</style>
</head>
<body>

<video id="video" autoplay playsinline></video>

<!-- ส่วนของวงเวทย์และไพ่ที่แยกออกมาเป็นชิ้นๆ แสดงผลชัวร์ 100% -->
<div id="magic-circle"></div>

<div id="tarot-card">
  <div class="card-num">0</div>
  <div class="card-art">🃏</div>
  <div class="card-title">THE FOOL</div>
</div>

<div id="status-box">🔮 [คลิกซ้าย 1 ครั้งบนจอ] เพื่ออัญเชิญไพ่ หรือ [ขยับเมาส์] เพื่อดูวงเวทย์</div>

<script>
const video = document.getElementById("video");
const magicCircle = document.getElementById("magic-circle");
const tarotCard = document.getElementById("tarot-card");
const statusBox = document.getElementById("status-box");

// 1. ระบบวงเวทย์วิ่งไล่ตามนิ้ว/เมาส์แบบ Real-time
window.addEventListener('mousemove', (e) => {
  magicCircle.style.display = "block";
  magicCircle.style.left = e.clientX + "px";
  magicCircle.style.top = e.clientY + "px";
});

window.addEventListener('touchmove', (e) => {
  if (e.touches.length > 0) {
    magicCircle.style.display = "block";
    magicCircle.style.left = e.touches[0].clientX + "px";
    magicCircle.style.top = e.touches[0].clientY + "px";
  }
});

// 2. ระบบคลิกเพื่อเปิดไพ่และระเบิดพลัง
window.addEventListener('click', (e) => {
  // แสดงไพ่ทาโรต์ตรงกลางจอทันที
  tarotCard.classList.add("show");

  // ล็อควงเวทย์ให้อยู่ตรงจุดที่คลิกล่าสุด
  magicCircle.style.display = "block";
  magicCircle.style.left = e.clientX + "px";
  magicCircle.style.top = e.clientY + "px";
  magicCircle.style.borderColor = "#ffb703"; // เปลี่ยนวงเวทย์เป็นสีทอง
  magicCircle.style.boxShadow = "0 0 30px #ffb703";

  // เปลี่ยนแถบข้อความด้านล่างเป็นเวอร์ชันอัญเชิญสำเร็จสีม่วง-ทองตามบรีฟ
  statusBox.innerHTML = "🔮 อัญเชิญสำเร็จ! ไพ่ 'THE FOOL' ของแท้ จากไรเดอร์-เวท";
  statusBox.style.color = "#ffb703"; 
  statusBox.style.borderColor = "#ffb703"; 
  statusBox.style.boxShadow = "0 0 30px rgba(255, 183, 3, 0.8)";
});

// 3. เรียกใช้งานกล้องเว็บแคมปกติ
navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 }, audio: false })
.then(stream => {
  video.srcObject = stream;
})
.catch(err => {
  console.error("Camera error:", err);
});
</script>
</body>
</html>
