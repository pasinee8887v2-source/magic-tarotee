<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Magic Tarot 🔮 - Debug Edition</title>
<style>
  body { 
    margin: 0; 
    overflow: hidden; 
    background: #000; 
    font-family: 'Segoe UI', sans-serif; 
  }
  video, canvas { 
    position: absolute; 
    width: 100%; 
    height: 100%; 
    object-fit: cover; 
    transform: scaleX(-1); /* Mirror ภาพกล้อง */
  }
  
  #status-box {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(35, 10, 55, 0.9); 
    color: #fff;
    padding: 15px 40px;
    border-radius: 30px;
    font-size: 20px;
    font-weight: bold;
    border: 2px solid #ba55d3; 
    box-shadow: 0 0 20px rgba(186, 85, 211, 0.6);
    z-index: 100;
    text-align: center;
    white-space: nowrap;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- ดึงวิดีโอจากกล้องเว็บแคม (ซ่อนไว้ใช้เป็น Source ของ Canvas) -->
<video id="video" autoplay playsinline style="display: none;"></video>
<!-- Canvas แสดงผลหลัก -->
<canvas id="canvas"></canvas>

<!-- แถบข้อความสถานะด้านล่าง -->
<div id="status-box">🔮 [คลิกที่หน้าจอ] เพื่อทดสอบอัญเชิญไพ่ The Fool 🔮</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const statusBox = document.getElementById("status-box");

let isCardRevealed = false;
let particles = [];
let circlePosition = { x: 0, y: 0 };

// 🌟 ย้ายเอฟเฟคทั้งหมดมาทำงานผ่านการคลิกเพื่อพิสูจน์ระบบ 🌟
window.addEventListener('click', (e) => {
  // หาพิกัดการคลิกบนหน้าจอ
  circlePosition = { x: e.clientX, y: e.clientY };
  
  isCardRevealed = true;
  
  // เกิดเอฟเฟคระเบิดละอองกระจาย 35 ชิ้น
  for (let i = 0; i < 35; i++) {
    particles.push(new Particle(circlePosition.x, circlePosition.y, true));
  }

  // อัปเดตข้อความด้านล่างตามบรีฟเป๊ะๆ
  statusBox.innerHTML = "🔮 อัญเชิญสำเร็จ! ไพ่ 'THE FOOL' ของแท้ จากไรเดอร์-เวท";
  statusBox.style.color = "#ffb703"; // สีทอง

  console.log("Magic triggered via click at", circlePosition);
});

// --- 🔮 คลาสเอฟเฟคประกายเวทมนต์ (Particles) 🔮 ---
class Particle {
  constructor(x, y, isExplosion = false) {
    this.x = x;
    this.y = y;
    this.size = isExplosion ? Math.random() * 6 + 2 : Math.random() * 4 + 1;
    const speedMultiplier = isExplosion ? 7 : 3;
    this.speedX = (Math.random() - 0.5) * speedMultiplier;
    this.speedY = (Math.random() - 0.5) * speedMultiplier;
    this.color = ["#9d4edd", "#c8b6ff", "#00ffff", "#ffb703"][Math.floor(Math.random() * 4)];
    this.alpha = 1;
    this.decay = isExplosion ? 0.02 : 0.025;
  }
  update() { this.x += this.speedX; this.y += this.speedY; this.alpha -= this.decay; }
  draw() {
    ctx.save(); ctx.globalAlpha = this.alpha; ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.color; ctx.shadowBlur = 10; ctx.shadowColor = this.color;
    ctx.fill(); ctx.restore();
  }
}

// --- 🔮 วงเวทย์อักขระซ้อน 🔮 ---
function drawComplexCircle(x, y, radius) {
  let now = Date.now() / 1000;
  ctx.save(); ctx.shadowBlur = 20; ctx.shadowColor = "#9d4edd";
  ctx.lineWidth = 3; ctx.strokeStyle = "#9d4edd";
  ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI * 2); ctx.stroke();
  
  ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 1.5;
  ctx.save(); ctx.translate(x, y); ctx.rotate(-now); ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    let angle = (i * Math.PI * 2) / 6;
    ctx.moveTo(0, 0); ctx.lineTo(Math.cos(angle) * radius, Math.sin(angle) * radius);
  }
  ctx.stroke(); ctx.restore();
  ctx.restore();
}

// --- 🔮 ฟังก์ชันวาดตัวไพ่จำลอง The Fool กลางหน้าจอ 🔮 ---
function drawTarotCard() {
  const cardW = 240, cardH = 410;
  const cardX = (canvas.width - cardW) / 2, cardY = (canvas.height - cardH) / 2;
  ctx.save(); ctx.shadowBlur = 35; ctx.shadowColor = "#ffb703"; ctx.strokeStyle = "#ba55d3"; ctx.lineWidth = 5;
  
  let grad = ctx.createLinearGradient(cardX, cardY, cardX, cardY + cardH);
  grad.addColorStop(0, "#fff3b0"); grad.addColorStop(0.5, "#e0aaff"); grad.addColorStop(1, "#3c096c");
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.roundRect(cardX, cardY, cardW, cardH, 15); ctx.fill(); ctx.stroke();

  // วาดสัญลักษณ์ไพ่ The Fool จำลองสั้นๆ
  ctx.fillStyle = "#fff"; ctx.shadowBlur = 15; ctx.beginPath(); ctx.arc(cardX + 40, cardY + 50, 25, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = "#3c096c"; ctx.font = "bold 45px Georgia"; ctx.textAlign = "center";
  ctx.fillText("0", cardX + cardW/2, cardY + 110);
  ctx.font = "20px Georgia"; ctx.fillText("THE FOOL", cardX + cardW/2, cardY + cardH - 35);
  ctx.restore();
}

function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resizeCanvas); resizeCanvas();

// ระบบลูปหลักวาดกราฟิกบน Canvas
function renderFrame() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // วาดกล้องหลังจาก Canvas (ซ่อน Source Video ไว้หลัง Canvas)
  ctx.save(); ctx.scale(-1, 1);
  ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
  ctx.restore();

  // อัปเดตและวาดเอฟเฟคประกาย
  particles.forEach((p, index) => {
    p.update(); p.draw();
    if (p.alpha <= 0) particles.splice(index, 1);
  });

  // แสดงผลกราฟิกเมื่อมีการคลิก
  if (isCardRevealed) {
    drawComplexCircle(circlePosition.x, circlePosition.y, 80);
    drawTarotCard();
  }

  requestAnimationFrame(renderFrame);
}

// เปิดกล้องเว็บแคม
navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 }, audio: false })
.then(stream => {
  video.srcObject = stream;
  // เริ่มรันระบบวาดภาพหลัก
  video.addEventListener('loadeddata', renderFrame);
})
.catch(err => {
  console.error("Camera error:", err);
  alert("กรุณาเปิดสิทธิ์กล้องบนเบราว์เซอร์ด้วยนะครับ");
});
</script>
</body>
</html>
