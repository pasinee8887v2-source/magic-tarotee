<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ritual Dark Magic 🔮</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body, html { overflow: hidden; background: #000; width: 100%; height: 100%; font-family: 'Georgia', serif; user-select: none; }
  video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); z-index: 1; }
  canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2; pointer-events: none; }
</style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let particles = [];
let showMagicianCard = false;
let circleRotation = 0;

class MysticAura {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.size = Math.random() * 9 + 4;
    this.speedX = (Math.random() - 0.5) * 4;
    this.speedY = (Math.random() - 0.5) * 4 - 1.5;
    const ritualColors = ["#3c096c", "#5a189a", "#ffb703", "#ff9e00", "#140024", "#241133"];
    this.color = ritualColors[Math.floor(Math.random() * ritualColors.length)];
    this.alpha = 1;
    this.decay = Math.random() * 0.012 + 0.008;
  }
  update() { this.x += this.speedX; this.y += this.speedY; this.alpha -= this.decay; }
  draw() {
    ctx.save(); ctx.globalAlpha = this.alpha; ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.color; ctx.shadowBlur = 30; ctx.shadowColor = this.color;
    ctx.fill(); ctx.restore();
  }
}

function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resizeCanvas); resizeCanvas();

function drawGothicMagician() {
  const cardW = 260, cardH = 430;
  const cx = canvas.width / 2, cy = canvas.height / 2;
  ctx.save();
  circleRotation += 0.006;
  ctx.translate(cx, cy); ctx.rotate(circleRotation);
  ctx.strokeStyle = "rgba(255, 158, 0, 0.45)"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0, 0, 260, 0, Math.PI * 2); ctx.stroke();
  ctx.setLineDash([8, 18]);
  ctx.beginPath(); ctx.arc(0, 0, 285, 0, Math.PI * 2); ctx.stroke();
  ctx.restore();

  ctx.save();
  const cardX = cx - cardW / 2, cardY = cy - cardH / 2;
  ctx.shadowBlur = 70; ctx.shadowColor = "rgba(255, 110, 0, 0.75)"; ctx.strokeStyle = "#c99722"; ctx.lineWidth = 4.5;
  let grad = ctx.createLinearGradient(cardX, cardY, cardX, cardY + cardH);
  grad.addColorStop(0, "#1f0c2b"); grad.addColorStop(0.5, "#3b200a"); grad.addColorStop(1, "#0a0112");
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.roundRect(cardX, cardY, cardW, cardH, 15); ctx.fill(); ctx.stroke();
  ctx.strokeStyle = "rgba(255, 183, 3, 0.25)"; ctx.lineWidth = 1.5;
  ctx.strokeRect(cardX + 12, cardY + 12, cardW - 24, cardH - 24);
  ctx.fillStyle = "#ffb703"; ctx.font = "34px Georgia"; ctx.textAlign = "center";
  ctx.shadowBlur = 12; ctx.shadowColor = "#ffb703";
  ctx.fillText("∞", cx, cardY + 80);
  ctx.font = "80px Georgia"; ctx.fillText("👁️‍🗨️", cx, cardY + 205);
  ctx.font = "26px Georgia"; ctx.fillStyle = "#d8bbff"; ctx.fillText("🪞 🪄 🗡️ 🏆", cx, cardY + 285);
  ctx.fillStyle = "rgba(8, 2, 12, 0.95)"; ctx.fillRect(cardX + 25, cardY + cardH - 75, cardW - 50, 45);
  ctx.strokeStyle = "#c99722"; ctx.strokeRect(cardX + 25, cardY + cardH - 75, cardW - 50, 45);
  ctx.fillStyle = "#ffb703"; ctx.font = "bold 18px 'Times New Roman', Georgia"; ctx.letterSpacing = "2px";
  ctx.fillText("I. THE MAGICIAN", cx, cardY + cardH - 46);
  ctx.restore();
}

function renderRitual() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update(); particles[i].draw();
    if (particles[i].alpha <= 0) particles.splice(i, 1);
  }
  if (showMagicianCard) drawGothicMagician();
  requestAnimationFrame(renderRitual);
}
renderRitual();

window.addEventListener('mousemove', (e) => {
  for(let i=0; i<3; i++) { particles.push(new MysticAura(e.clientX, e.clientY)); }
});
window.addEventListener('touchmove', (e) => {
  if (e.touches.length > 0) {
    for(let i=0; i<3; i++) { particles.push(new MysticAura(e.touches[0].clientX, e.touches[0].clientY)); }
  }
});
window.addEventListener('click', () => { showMagicianCard = !showMagicianCard; });

navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 }, audio: false })
.then(stream => { video.srcObject = stream; })
.catch(err => { console.error("Camera error:", err); });
</script>
</body>
</html>
