<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ritual Dark Magic 🔮</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
  body, html { overflow: hidden; background: #000; width: 100%; height: 100%; font-family: 'Georgia', serif; }
  #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; }
  .vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.95) 100%); pointer-events: none; z-index: 2; }
</style>
</head>
<body>
<div class="vignette"></div>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let particles = [], showCards = false, rot = 0, isTouching = false, tx = 0, ty = 0, holdTimer = null, shake = 0;
const tarotNames = ["7 ดาบ", "THE LOVERS", "3 ดาบ"];

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

class Particle {
  constructor(x, y, isStar = false) {
    this.x = x; this.y = y; this.size = Math.random() * (isStar ? 3 : 8) + 2;
    this.angle = Math.random() * Math.PI * 2;
    this.alpha = 1; this.isStar = isStar;
    this.speed = Math.random() * 2 + 1;
  }
  update() { this.x += Math.cos(this.angle) * this.speed; this.y += Math.sin(this.angle) * this.speed; this.alpha -= 0.02; }
  draw() {
    ctx.save(); ctx.globalAlpha = this.alpha;
    ctx.fillStyle = this.isStar ? "#ffb703" : "#7b2cbf";
    ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawTarot(x, y, name, index) {
  // ปรับระยะห่างและขนาดไพ่ให้เล็กลง (เดิม 160x240 เหลือ 100x150)
  let offsetX = (index - 1) * 120; 
  rot += 0.03;
  ctx.save(); ctx.translate(x + offsetX, y);
  
  // วงแหวนเล็กลงตามตัวไพ่
  ctx.lineWidth = 2;
  for(let i=0; i<3; i++) {
    ctx.save();
    ctx.rotate((i%2 ? 1 : -1) * rot * (1 + i*0.3));
    ctx.strokeStyle = i%2 ? "#ffb703" : "#7b2cbf";
    ctx.beginPath(); ctx.arc(0, 0, 60 + i*15, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
  }
  
  // ไพ่ขนาดกะทัดรัด
  ctx.fillStyle = "#1a052e"; ctx.fillRect(-50, -75, 100, 150);
  ctx.strokeStyle = "#ffb703"; ctx.strokeRect(-50, -75, 100, 150);
  
  ctx.fillStyle = "#ffb703"; ctx.font = "bold 14px serif"; ctx.textAlign = "center";
  ctx.fillText(name, 0, 5);
  
  ctx.restore();
}

function animate() {
  ctx.clearRect(0,0, canvas.width, canvas.height);
  if(shake > 0) { ctx.save(); ctx.translate(Math.random()*15-7, Math.random()*15-7); shake--; }
  
  if(isTouching) {
    particles.push(new Particle(tx, ty));
    if(Math.random() > 0.7) particles.push(new Particle(tx, ty, true));
  }
  particles = particles.filter(p => p.alpha > 0);
  particles.forEach(p => { p.update(); p.draw(); });

  if(showCards) {
    tarotNames.forEach((name, i) => drawTarot(tx, ty, name, i));
  }
  
  if(shake > 0) ctx.restore();
  requestAnimationFrame(animate);
}
animate();

window.addEventListener('mousedown', (e) => {
  tx = e.clientX; ty = e.clientY; isTouching = true;
  holdTimer = setTimeout(() => { showCards = true; shake = 30; }, 800);
});
window.addEventListener('mousemove', (e) => { tx = e.clientX; ty = e.clientY; });
window.addEventListener('mouseup', () => { isTouching = false; showCards = false; clearTimeout(holdTimer); });
</script>
</body>
</html>
