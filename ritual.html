<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ritual Dark Magic 🔮</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
  body, html { overflow: hidden; background: #000; width: 100%; height: 100%; font-family: 'Georgia', serif; }
  #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; }
  .vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.9) 100%); pointer-events: none; z-index: 2; }
</style>
</head>
<body>
<div class="vignette"></div>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let particles = [], cardOpacity = 0, circleRotation = 0, isTouching = false, touchX = 0, touchY = 0, showMagicianCard = false, shake = 0;

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

class Particle {
  constructor(x, y) { this.x = x; this.y = y; this.size = Math.random() * 8 + 2; this.angle = Math.random() * Math.PI * 2; this.alpha = 1; }
  update() { this.x += Math.cos(this.angle) * 3; this.y += Math.sin(this.angle) * 3; this.alpha -= 0.05; }
  draw() { ctx.save(); ctx.globalAlpha = this.alpha; ctx.fillStyle = "#7b2cbf"; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); ctx.restore(); }
}

function draw() {
  ctx.clearRect(0,0, canvas.width, canvas.height);
  
  // ระบบสั่นหน้าจอเมื่อไพ่ปรากฏ (Shake Effect)
  if(shake > 0) { 
    ctx.save(); 
    ctx.translate(Math.random()*20-10, Math.random()*20-10); 
    shake--; 
  }
  
  if(isTouching) particles.push(new Particle(touchX, touchY));
  particles = particles.filter(p => p.alpha > 0);
  particles.forEach(p => { p.update(); p.draw(); });

  if(showMagicianCard) {
    cardOpacity = Math.min(1, cardOpacity + 0.05);
    circleRotation += 0.06;
    ctx.save(); ctx.globalAlpha = cardOpacity; ctx.translate(touchX, touchY);
    // วงแหวนเวทหมุนเร็ว
    ctx.strokeStyle = "#ffb703"; ctx.lineWidth = 3;
    for(let i=0; i<4; i++) {
      ctx.save(); ctx.rotate((i%2 ? 1 : -1) * circleRotation * (1 + i*0.3));
      ctx.beginPath(); ctx.arc(0, 0, 120 + i*30, 0, Math.PI*2); ctx.stroke();
      ctx.restore();
    }
    // ไพ่
    ctx.fillStyle = "#1a052e"; ctx.fillRect(-80, -120, 160, 240);
    ctx.strokeStyle = "#ffb703"; ctx.lineWidth = 4; ctx.strokeRect(-80, -120, 160, 240);
    ctx.fillStyle = "#ffb703"; ctx.font = "40px serif"; ctx.textAlign = "center";
    ctx.fillText("👁️", 0, 15);
    ctx.restore();
  }
  
  if(shake > 0) ctx.restore();
  requestAnimationFrame(draw);
}
draw();

window.addEventListener('mousedown', (e) => {
  touchX = e.clientX; touchY = e.clientY; isTouching = true;
  setTimeout(() => { showMagicianCard = true; shake = 20; }, 800);
});
window.addEventListener('mouseup', () => { isTouching = false; showMagicianCard = false; cardOpacity = 0; });

window.addEventListener('touchstart', (e) => {
  touchX = e.touches[0].clientX; touchY = e.touches[0].clientY; isTouching = true;
  setTimeout(() => { showMagicianCard = true; shake = 20; }, 800);
});
window.addEventListener('touchend', () => { isTouching = false; showMagicianCard = false; cardOpacity = 0; });
</script>
</body>
</html>
