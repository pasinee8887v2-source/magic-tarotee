<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Ritual Dark Magic 🔮</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #webcam { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); filter: contrast(1.5) brightness(0.5); z-index: 1; }
        #canvas { position: absolute; width: 100%; height: 100%; z-index: 2; }
        .vignette { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.95) 100%); pointer-events: none; z-index: 3; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="vignette"></div>
    <video id="webcam" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById("webcam");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        let rot = 0, float = 0;

        async function init() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            render();
        }

        // ฟังก์ชันวาดวงแหวน 4 ชั้น
        function drawRings(x, y) {
            rot += 0.02;
            for(let i=0; i<4; i++) {
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate((i % 2 === 0 ? 1 : -1) * rot * (1 + i * 0.2));
                ctx.strokeStyle = i % 2 === 0 ? "#ffb703" : "#7b2cbf";
                ctx.lineWidth = 3;
                ctx.beginPath(); ctx.arc(0, 0, 80 + i * 25, 0, Math.PI * 2); ctx.stroke();
                ctx.restore();
            }
        }

        // ฟังก์ชันวาดไพ่ 3 ใบ
        function drawCards(x, y) {
            float = Math.sin(Date.now() / 500) * 10;
            const names = ["7 ดาบ", "THE LOVERS", "3 ดาบ"];
            names.forEach((name, i) => {
                let dx = x + (i - 1) * 110;
                let dy = y + float;
                ctx.fillStyle = "#1a052e"; ctx.fillRect(dx - 50, dy - 75, 100, 150);
                ctx.strokeStyle = "#ffb703"; ctx.strokeRect(dx - 50, dy - 75, 100, 150);
                ctx.fillStyle = "#ffb703"; ctx.font = "bold 14px serif"; ctx.textAlign = "center";
                ctx.fillText(name, dx, dy + 5);
            });
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // จำลองพิกัดกลางจอ (สามารถเชื่อมกับพิกัดมือได้ในขั้นถัดไป)
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            drawRings(cx, cy);
            drawCards(cx, cy);
            requestAnimationFrame(render);
        }

        init();
    </script>
</body>
</html>
