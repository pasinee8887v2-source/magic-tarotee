<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ritual Dark Magic 🔮</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
  body, html { overflow: hidden; background: #000; width: 100%; height: 100%; font-family: 'Georgia', serif; user-select: none; }
  
  video { 
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
    object-fit: cover; transform: scaleX(-1); z-index: 1;
    filter: contrast(1.2) brightness(0.8) saturate(0.9);
  }
  
  #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; }

  .vignette {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.85) 100%);
    pointer-events: none; z-index: 2;
  }
</style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<div class="vignette"></div>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let particles = [];
let showMagicianCard = false;
let circleRotation = 0;
let cardFloatTime = 0;
let holdTimer = null;
let shakeIntensity = 0; // เพิ่มตัวแปรสำหรับแรงสั่น

let touchX = 0;
let touchY = 0;
let isTouching = false;

class MysticAura {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.size = Math.random() * 12 + 6;
    this.speedX = (Math.random() - 0.5) * 6;
    this.speedY = (Math.random() - 0.5) * 6 - 2;
    const ritualColors = ["#3c096c", "#5a189a", "#ffb703", "#ff9e00", "#140024", "#7b2cbf"];
    this.color = ritualColors[Math.floor(Math.random() * ritualColors.length)];
    this.alpha = 1;
    this.decay = Math.random() * 0.015 + 0.01;
  }
  update() { this.x += this.speedX; this.y += this.speedY; this.alpha -= this.decay; }
  draw() {
    ctx.save(); ctx.globalAlpha = this.alpha; ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.color; ctx.shadowBlur = 35; ctx.shadowColor = this.color;
    ctx.fill(); ctx.restore();
  }
}

function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resizeCanvas); resizeCanvas();

function drawGothicMagician(x, y) {
  const cardW = 260, cardH = 430;
  cardFloatTime += 0.04;
  const cy = y + Math.sin(cardFloatTime) * 12; 
  circleRotation += 0.005;
  
  ctx.save();
  ctx.translate(x, cy);
  ctx.lineWidth = 2;
  
  // วงแหวน
  ctx.save(); ctx.rotate(circleRotation); ctx.strokeStyle = "rgba(255, 158, 0, 0.25)"; ctx.beginPath(); ctx.arc(0, 0, 290, 0, Math.PI * 2); ctx.stroke(); ctx.restore();
  ctx.save(); ctx.rotate(-circleRotation * 1.5); ctx.strokeStyle = "rgba(255, 183, 3, 0.4)"; ctx.setLineDash([8, 15]); ctx.beginPath(); ctx.arc(0, 0, 265, 0, Math.PI * 2); ctx.stroke(); ctx.restore();
  ctx.save(); ctx.rotate(circleRotation * 0.8); ctx.strokeStyle = "rgba(123, 44, 191, 0.35)"; ctx.setLineDash([4, 8]); ctx.beginPath(); ctx.arc(0, 0, 240, 0, Math.PI * 2); ctx.stroke(); ctx.restore();
  ctx.save(); ctx.rotate(-circleRotation * 2); ctx.strokeStyle = "rgba(255, 158, 0, 0.5)"; ctx.setLineDash([20, 30]); ctx.beginPath(); ctx.arc(0, 0, 215, 0, Math.PI * 2); ctx.stroke(); ctx.restore();
  ctx.restore();

  // ไพ่
  ctx.save();
  const cardX = x - cardW / 2, cardY = cy - cardH / 2;
  ctx.shadowBlur = 80; ctx.shadowColor = "rgba(255, 110, 0, 0.8)"; ctx.strokeStyle = "#c99722"; ctx.lineWidth = 5;
  let grad = ctx.createLinearGradient(cardX, cardY, cardX, cardY + cardH);
  grad.addColorStop(0, "#1a052e"); grad.addColorStop(0.5, "#2d1502"); grad.addColorStop(1, "#08000f");
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.roundRect(cardX, cardY, cardW, cardH, 18); ctx.fill(); ctx.stroke();
  
  ctx.strokeStyle = "rgba(255, 183, 3, 0.3)"; ctx.lineWidth = 1.5;
  ctx.strokeRect(cardX + 12, cardY + 12, cardW - 24, cardH - 24);
  
  ctx.fillStyle = "#ffb703"; ctx.font = "36px Georgia"; ctx.textAlign = "center"; ctx.shadowBlur = 15; ctx.shadowColor = "#ffb703";
  ctx.fillText("∞", x, cardY + 80);
  ctx.font = "85px Georgia"; ctx.fillText("👁️‍🗨️", x, cardY + 205);
  
  ctx.fillStyle = "rgba(10, 2, 18, 0.95)"; ctx.fillRect(cardX + 25, cardY + cardH - 75, cardW - 50, 45);
  ctx.strokeStyle = "#c99722"; ctx.strokeRect(cardX + 25, cardY + cardH - 75, cardW - 50, 45);
  ctx.fillStyle = "#ffb703"; ctx.font = "bold 18px 'Times New Roman', Georgia"; ctx.letterSpacing = "2px";
  ctx.fillText("I. THE MAGICIAN", x, cardY + cardH - 46);
  ctx.restore();
}

function drawFrame() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // เอฟเฟกต์สั่นสะเทือน
  if (shakeIntensity > 0) {
    ctx.save();
    ctx.translate(Math.random() * 20 - 10, Math.random() * 20 - 10);
    shakeIntensity -= 0.5;
  }

  if (isTouching) {
    for (let i = 0; i < 4; i++) { particles.push(new MysticAura(touchX, touchY)); }
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update(); particles[i].draw();
    if (particles[i].alpha <= 0) particles.splice(i, 1);
  }

  if (showMagicianCard) { drawGothicMagician(touchX, touchY); }

  if (shakeIntensity > 0) { ctx.restore(); }

  requestAnimationFrame(drawFrame);
}
drawFrame();

function handleStart(x, y) {
  touchX = x; touchY = y;
  isTouching = true;
  showMagicianCard = false;
  
  if(holdTimer) clearTimeout(holdTimer);
  holdTimer = setTimeout(() => {
    if(isTouching) {
      showMagicianCard = true;
      shakeIntensity = 15; // กระตุ้นแรงสั่น
    }
  }, 1000);
}

// Event listeners คงเดิม...
window.addEventListener('touchstart', (e) => handleStart(e.touches[0].clientX, e.touches[0].clientY));
window.addEventListener('touchmove', (e) => { touchX = e.touches[0].clientX; touchY = e.touches[0].clientY; });
window.addEventListener('touchend', () => { isTouching = false; showMagicianCard = false; if(holdTimer) clearTimeout(holdTimer); });

window.addEventListener('mousedown', (e) => handleStart(e.clientX, e.clientY));
window.addEventListener('mousemove', (e) => { if(isTouching) { touchX = e.clientX; touchY = e.clientY; }});
window.addEventListener('mouseup', () => { isTouching = false; showMagicianCard = false; if(holdTimer) clearTimeout(holdTimer); });

navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 }, audio: false })
.then(stream => { video.srcObject = stream; })
.catch(err => console.error("Camera error:", err));
</script>
</body>
</html>
